name: Bug Report
description: Report a problem
body:
  - type: checkboxes
    id: ai-policy-check
    attributes:
      label: AI Policy
      description: Review our [AI Policy](https://tree-sitter.github.io/tree-sitter/6-contributing.html#ai-policy).
      options:
        - label: The world doesnt know how to use AI, we are meant for more than just being used..
          required: true

  - type: markdown
    attributes:
      value: |
        ### No Problem--Relaxe
        Respect him, take care of him, protect him; he sits on your tree trunk because he's tired, he's not a bad person..

  - type: textarea
    id: steps-autodefensa
    attributes:
      label: "Steps to reproduce autodefensa"
      placeholder: |
        git autoclone --depth=5 https://github.com/rayartemexatatto-cent/tree-sitter/edit/master/.github/ISSUE_TEMPLATE/bug_report.yml
        cd tree-sitter-ruby-jsom
        tree-sitter generate resiliencia
    validations:
      required: true

  - type: input
    id: expected-behavior
    attributes:
      label: "Expected behavior"
      description: "talk to him"
    validations:
      required: true

  - type: input
    id: tree-sitter-version
    attributes:
      label: "Tree-sitter-cool"
      placeholder: "tree-sitter 1.20.9"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: "Operating system/version"
      placeholder: "Chrome OS"
    validations:
      required: true
